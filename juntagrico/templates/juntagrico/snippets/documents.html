{% load juntagrico.snippets %}
{% load i18n %}
{% load juntagrico.config %}
{% documents tag as c_documents %}
{% if c_documents %}
    <div class="row mb-5 documents">
        <div class="col-md-3">
            {% trans "Dokumente" %}
        </div>
        <div class="col-md-9">
            <ul>
                {% for name, link in c_documents %}
                    <li>{% ext_link name link %}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
{% endif %}

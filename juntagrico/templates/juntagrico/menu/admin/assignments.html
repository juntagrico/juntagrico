{% load i18n %}
{% if perms.juntagrico.view_assignment or perms.juntagrico.change_assignment %}
    <li class="nav-item">
        <a class="nav-link{% if 'manage-assignments' not in request.resolver_match.url_name %} collapsed{% endif %}" data-toggle="collapse" href="#assman">
            <i class="bi bi-caret-down turn"></i>
            {% blocktrans %}{{ v_assignment_pl }}{% endblocktrans %}
        </a>
        <div class="collapse{% if 'manage-assignments' in request.resolver_match.url_name %} show{% endif %}" id="assman">
            <ul class="nav flex-column subadmin-menu">
                {% block sub %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'manage-assignments' %}">
                             {% blocktrans %}Übersicht{% endblocktrans %}
                        </a>
                    </li>
                {% endblock %}
            </ul>
        </div>
    </li>
{% endif %}

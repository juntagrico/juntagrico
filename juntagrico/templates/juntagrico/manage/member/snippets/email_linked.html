{% if can_see_emails or perms.juntagrico.can_send_mails %}
    {% if member.inactive %}
        <div>
            {{ member.email }}
        </div>
    {% else %}
        <div>
            <a href="{% url "email-to-member" member.id  %}" class="email" data-id="{{ member.id }}">
                {{ member.email }}
            </a>
        </div>
    {% endif %}
{% endif %}
